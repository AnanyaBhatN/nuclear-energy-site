<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AtomicInsight | Nuclear Energy Explained</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

  <!-- External CSS -->
  <link rel="stylesheet" href="style.css">

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter'],
            heading: ['Montserrat']
          },
          colors: {
            nuclear: {
              500: '#0ea5e9',
              600: '#0284c7'
            }
          }
        }
      }
    }
  </script>
</head>

<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-200 transition-colors flex flex-col min-h-screen">

<!-- NAVBAR -->
<nav class="fixed w-full z-50 glass-nav border-b">
  <div class="max-w-7xl mx-auto px-6 h-16 flex justify-between items-center">
    <div class="flex items-center gap-3 cursor-pointer" onclick="router.navigate('home')">
      <i class="fa-solid fa-atom text-nuclear-500 text-xl animate-spin-slow"></i>
      <span class="font-heading font-bold text-lg">Atomic<span class="text-nuclear-600">Insight</span></span>
    </div>

    <div class="hidden lg:flex gap-6 items-center">
      <button class="nav-link" onclick="router.navigate('home')" id="nav-home">Home</button>
      <button class="nav-link" onclick="router.navigate('basics')" id="nav-basics">Basics</button>
      <button class="nav-link" onclick="router.navigate('working')" id="nav-working">Working</button>
      <button class="nav-link" onclick="router.navigate('benefits')" id="nav-benefits">Benefits</button>
      <button class="nav-link" onclick="router.navigate('risks')" id="nav-risks">Risks</button>
      <button class="nav-link" onclick="router.navigate('myths')" id="nav-myths">Myths</button>
      <button class="nav-link" onclick="router.navigate('today')" id="nav-today">Future</button>
      <button class="nav-link" onclick="router.navigate('resources')" id="nav-resources">Resources</button>

      <button onclick="toggleTheme()">
        <i class="fa-solid fa-moon hidden dark:block"></i>
        <i class="fa-solid fa-sun block dark:hidden"></i>
      </button>
    </div>
  </div>
</nav>

<!-- CONTENT -->
<main id="app" class="pt-20 flex-grow"></main>

<!-- FOOTER -->
<footer class="border-t py-8 text-center text-sm text-slate-500">
  Designed & Developed by <strong>Ananya Bhat N</strong>
</footer>

<script src="script.js"></script>
</body>
</html>
